<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Shop - Multi-Shop POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3c72;
            --primary-dark: #2b3b6e;
            --secondary: #667eea;
            --accent: #764ba2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2b3b6e 40%, #667eea 70%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.03) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
            z-index: 0;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(10px, -10px) rotate(2deg); }
            66% { transform: translate(-5px, 15px) rotate(-2deg); }
        }
        
        .select-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }
        
        .select-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px 36px 36px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25),
                        0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .select-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }
        
        .select-header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .select-header .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.35);
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        
        .select-header .logo-icon:hover {
            transform: scale(1.05) rotate(-3deg);
        }
        
        .select-header h3 {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: -0.5px;
        }
        
        .select-header h3 span {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .select-header p {
            color: #6b7a8f;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        
        .shop-list {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 4px;
        }
        
        .shop-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .shop-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .shop-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        
        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f8fafc;
            border-radius: 14px;
            margin-bottom: 10px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .shop-item:hover {
            border-color: var(--secondary);
            background: #f0f4ff;
            transform: translateX(4px);
        }
        
        .shop-item:active {
            transform: scale(0.98);
        }
        
        .shop-item .shop-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }
        
        .shop-item .shop-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .shop-item .shop-details {
            min-width: 0;
        }
        
        .shop-item .shop-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .shop-item .shop-address {
            font-size: 0.75rem;
            color: #6b7a8f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .shop-item .shop-status {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .shop-item .shop-status .badge-status {
            font-size: 0.65rem;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .badge-status.active {
            background: #d1fae5;
            color: #059669;
        }
        
        .badge-status.inactive {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .shop-item .shop-select-btn {
            padding: 6px 16px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .shop-item .shop-select-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .shop-item .shop-select-btn:active {
            transform: scale(0.95);
        }
        
        .shop-item .shop-select-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .empty-shops {
            text-align: center;
            padding: 40px 20px;
            color: #6b7a8f;
        }
        
        .empty-shops i {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 12px;
        }
        
        .empty-shops p {
            margin-bottom: 16px;
        }
        
        .btn-create-shop {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 24px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-create-shop:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            color: white;
        }
        
        .select-footer {
            text-align: center;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .select-footer .btn-logout {
            background: none;
            border: none;
            color: #6b7a8f;
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .select-footer .btn-logout:hover {
            color: #dc2626;
            background: #fee2e2;
        }
        
        .select-footer .user-info {
            font-size: 0.8rem;
            color: #6b7a8f;
        }
        
        .select-footer .user-info i {
            margin-right: 4px;
            color: var(--secondary);
        }
        
        .loading-spinner-small {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            min-width: 280px;
            max-width: 90%;
            animation: slideIn 0.3s ease;
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast-notification.success {
            background: #d4edda;
            color: #155724;
        }
        
        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .toast-notification.info {
            background: #cce5ff;
            color: #004085;
        }
        
        .toast-notification .toast-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: auto;
            opacity: 0.6;
        }
        
        .toast-notification .toast-close:hover { opacity: 1; }
        
        /* Responsive */
        @media (max-width: 480px) {
            .select-card {
                padding: 24px 18px 20px;
                border-radius: 20px;
            }
            
            .select-header .logo-icon {
                width: 56px;
                height: 56px;
                font-size: 1.6rem;
            }
            
            .select-header h3 {
                font-size: 1.2rem;
            }
            
            .shop-item {
                padding: 12px 14px;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .shop-item .shop-info {
                flex: 1;
                min-width: 0;
            }
            
            .shop-item .shop-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            
            .shop-item .shop-name {
                font-size: 0.85rem;
            }
            
            .shop-item .shop-address {
                font-size: 0.65rem;
            }
            
            .shop-item .shop-status .badge-status {
                font-size: 0.55rem;
                padding: 2px 8px;
            }
            
            .shop-item .shop-select-btn {
                font-size: 0.65rem;
                padding: 4px 12px;
                width: 100%;
                margin-top: 4px;
            }
            
            .shop-item .shop-status {
                flex-wrap: wrap;
                width: 100%;
                justify-content: flex-end;
            }
            
            .select-footer {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            
            .select-footer .btn-logout {
                text-align: center;
            }
            
            .select-footer .user-info {
                text-align: center;
            }
        }
        
        @media (max-width: 360px) {
            .select-card {
                padding: 16px 12px 16px;
            }
            
            .shop-item {
                padding: 10px 12px;
            }
            
            .shop-item .shop-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="select-container">
        <div class="select-card">
            <!-- Header -->
            <div class="select-header">
                <div class="logo-icon">
                    <i class="fas fa-store-alt"></i>
                </div>
                <h3>Select <span>Shop</span></h3>
                <p>Choose a shop to start selling</p>
            </div>
            
            <!-- Shop List -->
            <div id="shopList" class="shop-list">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted mt-2">Loading shops...</p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="select-footer">
                <span class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Loading...</span>
                </span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 10000;"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const colors = {
                success: '#d4edda',
                error: '#f8d7da',
                info: '#cce5ff'
            };
            const textColors = {
                success: '#155724',
                error: '#721c24',
                info: '#004085'
            };
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification ' + type;
            toast.style.background = colors[type] || colors.info;
            toast.style.color = textColors[type] || textColors.info;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }
        
        // ==================== LOGOUT ====================
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/logout';
            }
        }
        
        // ==================== SELECT SHOP ====================
        function selectShop(shopId, shopName) {
            showToast('Selecting shop...', 'info');
            
            $.ajax({
                url: '/api/shops/' + shopId + '/select',
                method: 'POST',
                contentType: 'application/json',
                success: function() {
                    showToast('✅ Switched to ' + shopName + '!', 'success');
                    setTimeout(function() {
                        window.location.href = '/pos';
                    }, 500);
                },
                error: function(xhr) {
                    let errorMsg = 'Failed to select shop';
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.error) errorMsg = data.error;
                    } catch(e) {}
                    showToast('❌ ' + errorMsg, 'error');
                }
            });
        }
        
        // ==================== LOAD SHOPS ====================
        function loadShops() {
            // Get current user info
            $.ajax({
                url: '/api/current-user',
                method: 'GET',
                success: function(user) {
                    $('#userName').text(user.full_name || user.username || 'User');
                },
                error: function() {
                    $('#userName').text('User');
                }
            });
            
            // Load shops
            $.ajax({
                url: '/api/shops',
                method: 'GET',
                success: function(shops) {
                    const list = document.getElementById('shopList');
                    
                    if (!shops || shops.length === 0) {
                        list.innerHTML = `
                            <div class="empty-shops">
                                <i class="fas fa-store-slash"></i>
                                <p>No shops available.</p>
                                <a href="/admin" class="btn-create-shop">
                                    <i class="fas fa-plus me-2"></i> Create Shop
                                </a>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '';
                    shops.forEach(function(shop) {
                        const statusClass = shop.is_active ? 'active' : 'inactive';
                        const statusText = shop.is_active ? 'Active' : 'Inactive';
                        
                        html += `
                            <div class="shop-item" data-shop-id="${shop.id}">
                                <div class="shop-info">
                                    <div class="shop-icon">
                                        <i class="fas fa-store"></i>
                                    </div>
                                    <div class="shop-details">
                                        <div class="shop-name">${escapeHtml(shop.name)}</div>
                                        <div class="shop-address">${shop.address || 'No address'}</div>
                                    </div>
                                </div>
                                <div class="shop-status">
                                    <span class="badge-status ${statusClass}">${statusText}</span>
                                    <button class="shop-select-btn" onclick="selectShop(${shop.id}, '${escapeHtml(shop.name)}')" ${!shop.is_active ? 'disabled' : ''}>
                                        ${shop.is_active ? 'Select' : 'Unavailable'}
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    
                    list.innerHTML = html;
                },
                error: function() {
                    document.getElementById('shopList').innerHTML = `
                        <div class="empty-shops">
                            <i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i>
                            <p>Failed to load shops. Please refresh.</p>
                            <button onclick="location.reload()" class="btn-create-shop" style="background: #f59e0b;">
                                <i class="fas fa-sync-alt me-2"></i> Retry
                            </button>
                        </div>
                    `;
                    showToast('Failed to load shops', 'error');
                }
            });
        }
        
        // ==================== ESCAPE HTML ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== INITIALIZE ====================
        $(document).ready(function() {
            loadShops();
        });
    </script>
</body>
</html>
