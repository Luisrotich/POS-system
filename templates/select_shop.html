<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Shop - POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #667eea;
            --success: #199708;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f0f2f8 0%, #e8ecf4 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container-custom {
            max-width: 900px;
            width: 100%;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header-section h2 {
            color: var(--primary);
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
        }
        
        .header-section p {
            color: #6b7a8f;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            margin-top: 5px;
        }
        
        .user-badge {
            display: inline-block;
            background: rgba(30, 60, 114, 0.1);
            padding: 6px 18px;
            border-radius: 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: clamp(0.8rem, 1.2vw, 0.95rem);
            margin-top: 8px;
        }
        
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .shop-card {
            background: white;
            border-radius: 16px;
            padding: 24px 20px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 2px solid #eef2f6;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .shop-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            border-color: var(--secondary);
        }
        
        .shop-card:active {
            transform: scale(0.97);
        }
        
        .shop-card .shop-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .shop-card .shop-name {
            font-weight: 700;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .shop-card .shop-detail {
            font-size: clamp(0.75rem, 1vw, 0.85rem);
            color: #6b7a8f;
            margin-bottom: 2px;
        }
        
        .shop-card .shop-detail i {
            width: 18px;
            color: var(--secondary);
        }
        
        .shop-card .shop-stats {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            font-size: clamp(0.7rem, 0.9vw, 0.8rem);
            color: #6b7a8f;
        }
        
        .shop-card .shop-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .shop-card .shop-stats i {
            color: var(--secondary);
        }
        
        .shop-card .enter-arrow {
            position: absolute;
            bottom: 16px;
            right: 16px;
            color: var(--secondary);
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        
        .shop-card:hover .enter-arrow {
            opacity: 1;
            transform: translateX(4px);
        }
        
        .no-shops {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        
        .no-shops i {
            font-size: 4rem;
            color: #c1c9d6;
            margin-bottom: 16px;
        }
        
        .no-shops h5 {
            color: var(--primary);
            font-weight: 600;
        }
        
        .no-shops p {
            color: #6b7a8f;
        }
        
        .btn-logout {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 16px;
            color: #ef4444;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        
        .btn-logout:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }
        
        .loading-spinner .spinner-border {
            width: 40px;
            height: 40px;
            color: var(--secondary);
        }
        
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .shop-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            
            .shop-card {
                padding: 18px 16px;
            }
            
            .btn-logout {
                top: 12px;
                right: 12px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            
            .btn-logout span {
                display: none;
            }
            
            .header-section {
                margin-bottom: 20px;
            }
        }
        
        .toast-custom {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: #f8d7da;
            color: #721c24;
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: none;
            font-weight: 500;
            font-size: 0.95rem;
            text-align: center;
            max-width: 90%;
            animation: slideDown 0.3s ease;
        }
        
        .toast-custom.success {
            background: #d4edda;
            color: #155724;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-custom"></div>

    <a href="/logout" class="btn-logout">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
    </a>

    <div class="container-custom">
        
        <div class="header-section">
            <h2><i class="fas fa-store me-2" style="color: var(--secondary);"></i>Select Your Shop</h2>
            <p>Choose which shop you want to work with</p>
            <div class="user-badge">
                <i class="fas fa-user-circle me-2"></i>
                <span id="userName">Loading...</span>
            </div>
        </div>

        <div id="shopContainer">
            <div class="loading-spinner">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        function getUserInfo() {
            $.ajax({
                url: '/api/current-user',
                method: 'GET',
                success: function(data) {
                    $('#userName').text(data.username || 'User');
                },
                error: function() {
                    $('#userName').text('User');
                }
            });
        }

        function loadShops() {
            const container = $('#shopContainer');
            
            $.ajax({
                url: '/api/shops',
                method: 'GET',
                success: function(shops) {
                    if (!shops || shops.length === 0) {
                        container.html(`
                            <div class="no-shops">
                                <i class="fas fa-store-slash"></i>
                                <h5>No Shops Available</h5>
                                <p>You don't have access to any shops. Contact your administrator.</p>
                            </div>
                        `);
                        return;
                    }

                    let html = '<div class="shop-grid">';
                    
                    shops.forEach(shop => {
                        const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#fee140', '#a18cd1'];
                        const colorIndex = shop.id % colors.length;
                        const iconColor = colors[colorIndex];
                        
                        html += `
                            <div class="shop-card" onclick="selectShop(${shop.id})" data-shop-id="${shop.id}">
                                <div class="shop-icon" style="background: ${iconColor};">
                                    <i class="fas fa-store"></i>
                                </div>
                                <div class="shop-name">${escapeHtml(shop.name)}</div>
                                <div class="shop-detail">
                                    <i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.address || 'No address')}
                                </div>
                                <div class="shop-detail">
                                    <i class="fas fa-phone"></i> ${escapeHtml(shop.phone || 'No phone')}
                                </div>
                                <div class="shop-detail">
                                    <i class="fas fa-money-bill-wave"></i> ${escapeHtml(shop.currency || 'KES')}
                                </div>
                                <div class="shop-stats">
                                    <span><i class="fas fa-boxes"></i> Loading...</span>
                                    <span><i class="fas fa-users"></i> Loading...</span>
                                </div>
                                <div class="enter-arrow">
                                    <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    container.html(html);
                    
                    shops.forEach(shop => {
                        loadShopStats(shop.id);
                    });
                    
                },
                error: function(xhr) {
                    let errorMsg = 'Failed to load shops. Please refresh.';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    container.html(`
                        <div class="no-shops" style="border: 2px solid #f8d7da;">
                            <i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>
                            <h5 style="color: #ef4444;">Error</h5>
                            <p>${escapeHtml(errorMsg)}</p>
                            <button class="btn btn-primary mt-3" onclick="loadShops()">
                                <i class="fas fa-sync-alt me-2"></i> Retry
                            </button>
                        </div>
                    `);
                }
            });
        }

        function loadShopStats(shopId) {
            $.ajax({
                url: `/api/shops/${shopId}/stats`,
                method: 'GET',
                success: function(stats) {
                    const card = $(`.shop-card[data-shop-id="${shopId}"]`);
                    if (card.length) {
                        card.find('.shop-stats').html(`
                            <span><i class="fas fa-boxes"></i> ${stats.total_products || 0} products</span>
                            <span><i class="fas fa-users"></i> ${stats.total_customers || 0} customers</span>
                        `);
                    }
                },
                error: function() {
                    const card = $(`.shop-card[data-shop-id="${shopId}"]`);
                    if (card.length) {
                        card.find('.shop-stats').html(`
                            <span><i class="fas fa-boxes"></i> -</span>
                            <span><i class="fas fa-users"></i> -</span>
                        `);
                    }
                }
            });
        }

        function selectShop(shopId) {
            showToast('Selecting shop...', 'info');
            
            $.ajax({
                url: `/api/shops/${shopId}/select`,
                method: 'POST',
                success: function(data) {
                    if (data.success) {
                        showToast(`✅ Switched to ${data.shop_name}`, 'success');
                        
                        $.ajax({
                            url: '/api/current-user',
                            method: 'GET',
                            success: function(user) {
                                if (user.role === 'admin') {
                                    window.location.href = '/admin';
                                } else {
                                    window.location.href = '/pos';
                                }
                            },
                            error: function() {
                                window.location.href = '/pos';
                            }
                        });
                    } else {
                        showToast('Failed to select shop', 'error');
                    }
                },
                error: function(xhr) {
                    let errorMsg = 'Failed to select shop. Please try again.';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    showToast(errorMsg, 'error');
                }
            });
        }

        function showToast(message, type = 'info') {
            const toast = $('#toast');
            toast.text(message);
            toast.removeClass('success error info');
            
            if (type === 'success') {
                toast.addClass('success');
                toast.css('background', '#d4edda');
                toast.css('color', '#155724');
            } else if (type === 'error') {
                toast.addClass('error');
                toast.css('background', '#f8d7da');
                toast.css('color', '#721c24');
            } else {
                toast.addClass('info');
                toast.css('background', '#cce5ff');
                toast.css('color', '#004085');
            }
            
            toast.fadeIn(300);
            
            setTimeout(() => {
                toast.fadeOut(300);
            }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function checkSession() {
            $.ajax({
                url: '/api/current-user',
                method: 'GET',
                error: function() {
                    window.location.href = '/';
                }
            });
        }

        $(document).ready(function() {
            getUserInfo();
            loadShops();
            setInterval(checkSession, 30000);
        });
    </script>

</body>
</html>
